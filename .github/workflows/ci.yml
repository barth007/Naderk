name: CI — Lint & Test

on:
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend — Django tests
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(toJson(github.event.pull_request.changed_files), 'BackEnd')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: naderk_user
          POSTGRES_PASSWORD: naderk_password
          POSTGRES_DB: naderk_test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: BackEnd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BackEnd/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgres://naderk_user:naderk_password@localhost:5432/naderk_test_db
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          LIVEKIT_URL: http://localhost:7880
          LIVEKIT_API_KEY: testkey
          LIVEKIT_API_SECRET: testsecret
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
        run: python manage.py test --verbosity=2 --keepdb

  # ── Frontend ───────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — ESLint & build check
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(toJson(github.event.pull_request.changed_files), 'FrontEnd')

    defaults:
      run:
        working-directory: FrontEnd/fronend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrontEnd/fronend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
          NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880

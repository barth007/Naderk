# Infrastructure only — db, redis, livekit.
# App services (web, celery, frontend) are defined in docker-compose.prod.yml.

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: naderk_user
      POSTGRES_PASSWORD: naderk_password
      POSTGRES_DB: naderk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - naderk_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - naderk_net
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./infrastructure/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882-7900:7882-7900/udp"
    networks:
      - naderk_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  naderk_net:
    driver: bridge

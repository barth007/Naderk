# Infrastructure only — db, redis, livekit.
# App services (web, celery, frontend) are defined in docker-compose.prod.yml.

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: naderk_user
      POSTGRES_PASSWORD: naderk_password
      POSTGRES_DB: naderk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - naderk_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - naderk_net
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./infrastructure/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882-7900:7882-7900/udp"
    networks:
      - naderk_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - naderk_net
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
      mc mb --ignore-existing local/$$MINIO_PUBLIC_BUCKET;
      mc mb --ignore-existing local/$$MINIO_PRIVATE_BUCKET;
      mc anonymous set download local/$$MINIO_PUBLIC_BUCKET;
      exit 0;"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-naderk-public}
      MINIO_PRIVATE_BUCKET: ${MINIO_PRIVATE_BUCKET:-naderk-private}
    networks:
      - naderk_net

volumes:
  postgres_data:
  minio_data:

networks:
  naderk_net:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: naderk_user
      POSTGRES_PASSWORD: naderk_password
      POSTGRES_DB: naderk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - naderk_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - naderk_net

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./infrastructure/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882-7900:7882-7900/udp"

    networks:
      - naderk_net

  web:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-development-secret-key-without-dollar-signs-12345

      - DATABASE_URL=postgres://naderk_user:naderk_password@db:5432/naderk_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=naderk-livekit-dev-secret-key-2024
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - livekit
    networks:
      - naderk_net

  frontend:
    build:
      context: ./FrontEnd/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
      - NEXT_PUBLIC_LIVEKIT_URL=ws://localhost:7880
    depends_on:
      - web
    networks:
      - naderk_net

volumes:
  postgres_data:

networks:
  naderk_net:
    driver: bridge

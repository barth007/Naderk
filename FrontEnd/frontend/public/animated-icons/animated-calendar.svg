<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" fill="none">
  <defs>
    <style>
      @keyframes calendarBounce {
        0%, 100% { transform: translateY(0) scale(1); }
        10% { transform: translateY(-2px) scale(1.05); }
        20% { transform: translateY(0) scale(1); }
        30% { transform: translateY(-1px) scale(1.02); }
        40% { transform: translateY(0) scale(1); }
      }
      @keyframes headerFlip {
        0%, 100% { transform: rotateX(0deg); opacity: 1; }
        50% { transform: rotateX(90deg); opacity: 0.5; }
      }
      @keyframes bodyPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      #calendar-group {
        animation: calendarBounce 3s ease-in-out infinite;
        transform-origin: center center;
      }
      #calendar-header {
        animation: headerFlip 3s ease-in-out infinite;
        transform-origin: center top;
      }
      #calendar-body {
        animation: bodyPulse 3s ease-in-out infinite;
      }
    </style>
  </defs>

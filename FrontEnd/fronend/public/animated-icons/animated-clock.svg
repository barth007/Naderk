<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes clockRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      #minute-hand {
        animation: clockRotate 10s linear infinite;
        transform-origin: 12px 12px;
      }
      #hour-hand {
        animation: clockRotate 60s linear infinite;
        transform-origin: 12px 12px;
      }
    </style>
  </defs>
  <circle cx="12" cy="12" r="10" stroke="#E53935" stroke-width="2"/>
  <path id="minute-hand" d="M12 7V12" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  <path id="hour-hand" d="M12 12L15 15" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
</svg>

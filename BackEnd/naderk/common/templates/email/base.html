<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block subject %}{{ subject }}{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f5;
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
    table { border-collapse: collapse; }
    img   { border: 0; display: block; max-width: 100%; }
    a     { color: #E03E3E; text-decoration: none; }
    @media (prefers-color-scheme: dark) {
      body, .email-wrapper { background-color: #1a1a1a !important; }
      .email-card { background-color: #242424 !important; }
      .text-main  { color: #f3f4f6 !important; }
      .text-muted { color: #9ca3af !important; }
      .divider    { border-top-color: #374151 !important; }
    }
    @media only screen and (max-width: 600px) {
      .email-card { border-radius: 0 !important; }
      .email-body { padding: 24px 16px !important; }
    }
  </style>
</head>
<body>
<table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0"
       style="background:#f4f4f5; padding: 32px 0;">
  <tr>
    <td align="center">
      <table class="email-card" width="560" cellpadding="0" cellspacing="0"
             style="background:#ffffff; border-radius:8px; overflow:hidden;
                    box-shadow: 0 1px 4px rgba(0,0,0,.08); max-width:560px; width:100%;">

        {# ── Header ── #}
        {% include "email/partials/header.html" %}

        {# ── Body ── #}
        <tr>
          <td class="email-body" style="padding: 32px 40px;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        {# ── Footer ── #}
        {% include "email/partials/footer.html" %}

      </table>
    </td>
  </tr>
</table>
</body>
</html>

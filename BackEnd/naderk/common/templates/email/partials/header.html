<tr>
  <td style="background: #E03E3E; padding: 24px 40px;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td>
          {% if brand_logo_url %}
            <img src="{{ brand_logo_url }}" alt="{{ brand_name }}"
                 style="height: 36px; width: auto;" />
          {% else %}
            <span style="color:#ffffff; font-size:20px; font-weight:700;
                         letter-spacing:-0.5px;">{{ brand_name }}</span>
          {% endif %}
        </td>
        {% if header_tag %}
        <td align="right">
          <span style="background:rgba(255,255,255,0.2); color:#ffffff;
                       font-size:11px; font-weight:600; padding:4px 10px;
                       border-radius:20px;">{{ header_tag }}</span>
        </td>
        {% endif %}
      </tr>
    </table>
  </td>
</tr>
